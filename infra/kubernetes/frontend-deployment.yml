apiVersion: apps/v1
kind: Deployment
metadata:
  name: treasury-react-portal
  namespace: treasury
spec:
  replicas: 2
  selector:
    matchLabels:
      app: treasury-react-portal
  template:
    metadata:
      labels:
        app: treasury-react-portal
    spec:
      containers:
        - name: treasury-react-portal
          image: ghcr.io/balulmath/treasury-react-portal:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_BASE_URL
              value: "https://treasury-api.example.com"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
