apiVersion: apps/v1
kind: Deployment
metadata:
  name: treasury-workflow-service
  namespace: treasury
spec:
  replicas: 3
  selector:
    matchLabels:
      app: treasury-workflow-service
  template:
    metadata:
      labels:
        app: treasury-workflow-service
    spec:
      containers:
        - name: treasury-workflow-service
          image: ghcr.io/balulmath/treasury-workflow-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: treasury-config
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: treasury-db
                  key: jdbc-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: treasury-db
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: treasury-db
                  key: password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
